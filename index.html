<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RanchoSmart - Gestión Ganadera Profesional</title>
    <meta name="description" content="Aplicación profesional para la gestión de ranchos ganaderos.">
    <link rel="stylesheet" href="styles/main.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Dexie.js CDN -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a2e1a">
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Sidebar / Mobile Nav -->
        <aside id="sidebar" class="sidebar">
            <div class="logo">
                <span class="logo-icon">🐄</span>
                <span class="logo-text">RanchoSmart</span>
            </div>
            <nav class="nav-menu">
                <a href="#dashboard" class="nav-item active" data-view="dashboard">
                    <i class="icon">📊</i> <span>Dashboard</span>
                </a>
                <a href="#animals" class="nav-item" data-view="animals">
                    <i class="icon">🐂</i> <span>Ganado</span>
                </a>
                <a href="#reproduction" class="nav-item" data-view="reproduction">
                    <i class="icon">🧬</i> <span>Reproducción</span>
                </a>
                <a href="#pastures" class="nav-item" data-view="pastures">
                    <i class="icon">🌿</i> <span>Potreros</span>
                </a>
                <a href="#vaccines" class="nav-item" data-view="vaccines">
                    <i class="icon">💉</i> <span>Vacunas</span>
                </a>
                <a href="#brands" class="nav-item" data-view="brands">
                    <i class="icon">🔥</i> <span>Fierros</span>
                </a>
                <a href="#finance" class="nav-item" data-view="finance">
                    <i class="icon">💰</i> <span>Finanzas</span>
                </a>
                <a href="#settings" class="nav-item" data-view="settings">
                    <i class="icon">⚙️</i> <span>Ajustes</span>
                </a>
                <a href="#field-mode" class="nav-item field-mode-nav" data-view="field-mode" style="background: var(--accent-vibrant); color: black; margin-top: auto; font-weight: 700;">
                    <i class="icon">🚜</i> <span>MODO CAMPO</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main id="main-content">
            <header class="top-bar">
                <button id="menu-toggle" class="mobile-only">☰</button>
                <h1 id="view-title">Dashboard</h1>
                <div class="user-profile">
                    <span class="user-name">Administrador</span>
                    <div class="user-avatar">AD</div>
                </div>
            </header>

            <section id="view-container" class="fade-in">
                <!-- Views will be injected here -->
                <div id="dashboard-view" class="view">
                    <!-- Dashboard skeleton -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-label">Total Animales</span>
                            <span class="stat-value" id="stat-total-animals">--</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Vacas Próximas</span>
                            <span class="stat-value" id="stat-pregnant-cows">--</span>
                        </div>
                        <div class="stat-card highlight">
                            <span class="stat-label">Alerta de Salud</span>
                            <span class="stat-value">3</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Core Scripts (Ordered by dependency) -->
    <script src="js/db.js"></script>
    <script src="js/modules/AnimalManager.js"></script>
    <script src="js/modules/Reproduction.js"></script>
    <script src="js/modules/Health.js"></script>
    <script src="js/modules/VisualAI.js"></script>
    <script src="js/modules/MedicineManager.js"></script>
    <script src="js/modules/BrandManager.js"></script>
    <script src="js/modules/PastureManager.js"></script>
    <script src="js/modules/FinanceManager.js"></script>
    <script src="js/components/UI.js"></script>
    <script src="js/components/Dashboard.js"></script>
    <script src="js/components/AnimalDetail.js"></script>
    <script src="js/components/ReproductionView.js"></script>
    <script src="js/components/PastureView.js"></script>
    <script src="js/components/VaccineView.js"></script>
    <script src="js/components/FieldModeView.js"></script>
    <script src="js/components/BrandView.js"></script>
    <script src="js/components/FinanceView.js"></script>
    <script src="js/components/SettingsView.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
